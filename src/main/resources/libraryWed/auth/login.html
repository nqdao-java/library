<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <div class="row justify-content-center mt-5">
      <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card">
          <div class="card-body">
            <h4 class="card-title mb-3 text-center">Đăng nhập</h4>
            <form method="post" th:action="@{/login}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <div th:if="${param.error}" class="alert alert-danger" role="alert">Tên đăng nhập hoặc mật khẩu không đúng.</div>
              <div th:if="${param.logout}" class="alert alert-success" role="alert">Bạn đã đăng xuất thành công.</div>
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="admin" required>
              </div>
              <div class="d-grid">
                <button class="btn btn-primary" type="submit">Đăng nhập</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
