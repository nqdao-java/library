<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body" class="container py-4">

    <div class="hero mb-5 p-4 bg-light rounded-3 shadow-sm border-start border-primary border-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title fw-bold text-dark m-0">
          <i class="bi bi-book-half text-primary me-2"></i>Danh mục sách
        </h2>
        <a class="btn btn-sm btn-outline-secondary px-3" th:href="@{/admin/home}">
          <i class="bi bi-gear-fill me-1"></i>Quản trị
        </a>
      </div>

      <div class="row">
        <div class="col-12">
          <form class="row g-3 search-form" th:action="@{/books}" method="get">

            <div class="col-md-3">
              <select class="form-select border-primary-subtle shadow-sm" name="categoryId" onchange="this.form.submit()">
                <option value="">Tất cả danh mục</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == selectedCatId}">
                </option>
              </select>
            </div>

            <div class="col-md-7">
              <div class="input-group shadow-sm">
                <span class="input-group-text bg-white border-primary-subtle">
                  <i class="bi bi-search text-muted"></i>
                </span>
                <input class="form-control border-primary-subtle border-start-0"
                       type="search"
                       name="q"
                       th:value="${q}"
                       placeholder="Nhập tiêu đề sách cần tìm...">
              </div>
            </div>

            <div class="col-md-2">
              <button class="btn btn-primary w-100 fw-bold shadow-sm" type="submit">
                Tìm kiếm
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
          <div class="col" th:each="book : ${books}">
            <div class="card h-100 border-0 shadow-sm book-card transition">
              <div class="card-body p-4">
                <div class="mb-2">
                  <span class="badge bg-primary-subtle text-primary rounded-pill px-3"
                        th:text="${book.category?.name}">Category</span>
                </div>

                <h5 class="card-title fw-bold text-dark mb-2" th:text="${book.title}">Title</h5>
                <p class="card-text mb-3">
                  <small class="text-muted"><i class="bi bi-person-fill me-1"></i>Tác giả: </small>
                  <strong th:text="${book.author}">Author</strong>
                </p>
                <p class="card-text text-secondary small line-clamp-3" th:text="${book.summary}">Summary</p>
              </div>
              <div class="card-footer bg-transparent border-0 p-4 pt-0">
                <a th:href="@{/books/detail(id=${book.id})}" class="btn btn-outline-primary w-100 rounded-pill fw-bold">
                  Xem chi tiết
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="text-center py-5" th:if="${#lists.isEmpty(books)}">
          <i class="bi bi-inbox text-muted display-1"></i>
          <p class="text-muted fs-5 mt-3">Không tìm thấy cuốn sách nào phù hợp.</p>
          <a th:href="@{/books}" class="btn btn-link">Xóa bộ lọc</a>
        </div>
      </div>
    </div>
  </div>

  <style>
    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
    .transition {
      transition: all 0.3s ease;
    }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 4.5em;
    }
  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</div>
