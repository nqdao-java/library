<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Mượn/Trả')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid mt-4 px-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0"><i class="fas fa-barcode"></i> Quét thẻ & Sách</h5>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form action="/loans/create" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mã người dùng (Thẻ Sinh viên/GV)</label>
                            <input type="text" name="username" class="form-control" required autofocus placeholder="VD: B21DCCN123">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mã vạch sách (Barcode)</label>
                            <input type="text" name="barcode" class="form-control" required placeholder="Quét mã vạch dán trên sách...">
                        </div>
                        <button type="submit" class="btn btn-success w-100"><i class="fas fa-plus"></i> Tạo Phiếu Mượn</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">Lịch sử mượn gần đây (Trạng thái: OPEN)</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Mã Phiếu</th>
                                <th>Người mượn</th>
                                <th>Sách (Mã vạch)</th>
                                <th>Ngày mượn</th>
                                <th>Hạn trả</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="loan : ${activeLoans}">
                                <td th:text="${loan.id}">101</td>
                                <td>
                                    <span th:text="${loan.user.fullName}">Nguyễn Văn A</span><br>
                                    <small class="text-muted" th:text="${loan.user.username}">B21DCCN123</small>
                                </td>
                                <td>
                                    <span th:text="${loan.bookItem.book.title}">Lập trình Java</span><br>
                                    <span class="badge bg-secondary" th:text="${loan.bookItem.barcode}">B100-01</span>
                                </td>
                                <td th:text="${#temporals.format(loan.borrowDate, 'dd/MM/yyyy')}">01/04/2026</td>

                                <td th:classappend="${loan.dueDate.isBefore(T(java.time.LocalDateTime).now())} ? 'text-danger fw-bold' : ''"
                                    th:text="${#temporals.format(loan.dueDate, 'dd/MM/yyyy')}">
                                    15/04/2026
                                </td>

                                <td>
                                    <form action="/loans/return" method="POST" class="d-inline">
                                        <input type="hidden" name="loanId" th:value="${loan.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-primary"
                                                onclick="return confirm('Xác nhận trả cuốn sách này?');">
                                            Nhận Trả Sách
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
