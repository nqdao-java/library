<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::body})">
  <body>
  <div class="container mt-4">
    <div class="row g-4">
      <div class="col-md-3">
        <div class="card h-100 border-primary shadow-sm">
          <div class="card-body text-center">
            <h6 class="text-uppercase fw-bold text-primary">Số sách</h6>
            <h2 class="display-6 fw-bold" th:text="${bookCount}">0</h2>
            <hr>
            <a class="btn btn-primary w-100" th:href="@{/admin/books}">
              <i class="bi bi-book"></i> Quản lý Sách
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card h-100 border-success shadow-sm">
          <div class="card-body text-center">
            <h6 class="text-uppercase fw-bold text-success">Số bản sao</h6>
            <h2 class="display-6 fw-bold" th:text="${itemCount}">0</h2>
            <hr>
            <a class="btn btn-success w-100" th:href="@{/admin/book-items}">
              <i class="bi bi-layers"></i> Quản lý Bản sao
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card h-100 border-warning shadow-sm">
          <div class="card-body text-center">
            <h6 class="text-uppercase fw-bold text-warning">Mượn hoạt động</h6>
            <h2 class="display-6 fw-bold" th:text="${activeLoans}">0</h2>
            <hr>
            <a class="btn btn-warning text-white w-100" th:href="@{/admin/loans}">
              <i class="bi bi-cart-check"></i> Cho mượn
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card h-100 border-danger shadow-sm">
          <div class="card-body text-center">
            <h6 class="text-uppercase fw-bold text-danger">Phạt chưa thu</h6>
            <h2 class="display-6 fw-bold" th:text="${openFines}">0</h2>
            <hr>
            <a class="btn btn-danger w-100" th:href="@{/admin/fines}">
              <i class="bi bi-exclamation-triangle"></i> Quản lý Phạt
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  </body>
</html>
