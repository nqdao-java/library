<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <div class="row mt-4">
      <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="mb-0 text-primary"><i class="bi bi- collection-play me-2"></i>Mượn đang mở</h3>
          <a class="btn btn-success" th:href="@{/admin/loans/borrow}">
            <i class="bi bi-plus-circle me-1"></i> Mượn mới
          </a>
        </div>

        <div class="table-responsive shadow-sm rounded">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Thông tin Sách</th>
              <th>Người mượn</th>
              <th>Ngày mượn</th>
              <th>Hạn trả</th>
              <th class="text-center">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="loan : ${loans}">
              <td th:text="${loan.id}">1</td>
              <td>
                <div><strong th:text="${loan.bookItem.book.title}">Title</strong></div>
                <small class="text-muted">
                  <i class="bi bi-person"></i> <span th:text="${loan.bookItem.book.author}">Author</span>
                </small>
              </td>
              <td th:text="${loan.borrowerName}">Name</td>
              <td th:text="${#temporals.format(loan.borrowDate, 'dd/MM/yyyy')}">borrow</td>
              <td th:text="${#temporals.format(loan.dueDate, 'dd/MM/yyyy')}">due</td>
              <td class="text-center">
                <form th:action="@{/admin/loans/{id}/return(id=${loan.id})}" method="post" class="d-inline">
                  <button class="btn btn-sm btn-primary px-3">
                    <i class="bi bi-arrow-return-left"></i> Trả sách
                  </button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(loans)}">
              <td colspan="6" class="text-center py-4 text-muted">Hiện không có đơn mượn nào đang hoạt động.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
