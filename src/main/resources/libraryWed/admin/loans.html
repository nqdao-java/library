<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <div class="row">
      <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h3 class="mb-0">Mượn đang mở</h3>
          <a class="btn btn-sm btn-success" th:href="@{/admin/loans/borrow}">Mượn mới</a>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr><th>#</th><th>Sách</th><th>Người mượn</th><th>Ngày mượn</th><th>Ngày trả</th><th>Thao tác</th></tr>
            </thead>
            <tbody>
              <tr th:each="loan : ${loans}">
                <td th:text="${loan.id}">1</td>
                <td>
                  <div><strong th:text="${loan.book.title}">Title</strong></div>
                  <small class="text-muted" th:text="${loan.book.author}">Author</small>
                </td>
                <td th:text="${loan.borrowerName}">Name</td>
                <td th:text="${#temporals.format(loan.borrowDate, 'yyyy-MM-dd HH:mm')}">borrow</td>
                <td th:text="${#temporals.format(loan.dueDate, 'yyyy-MM-dd')}">due</td>
                <td>
                  <form th:action="@{/admin/loans/{id}/return(id=${loan.id})}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-primary">Trả</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
