<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::body})">
  <body>
    <h3 th:text="${setting.id} == null ? #{settings.new} : #{settings.title}"></h3>
    <form th:action="@{/admin/settings}" th:object="${setting}" method="post">
      <div class="mb-3">
        <label class="form-label" th:text="#{settings.key}">Key</label>
        <input class="form-control" th:field="*{keyName}" />
      </div>
      <div class="mb-3">
        <label class="form-label" th:text="#{settings.value}">Value</label>
        <input class="form-control" th:field="*{settingValue}" />
      </div>
      <button class="btn btn-primary" th:text="#{button.save}">Save</button>
      <a class="btn btn-secondary" th:href="@{/admin/settings}" th:text="#{button.cancel}">Cancel</a>
    </form>
  </body>
</html>
