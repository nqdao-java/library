<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout/base :: layout(~{::body})">
  <body>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 th:text="#{settings.title}">System Settings</h3>
      <a class="btn btn-primary" th:href="@{/admin/settings/new}" th:text="#{settings.new}">New Setting</a>
    </div>
    <table class="table table-striped">
      <thead><tr><th>Key</th><th>Value</th><th></th></tr></thead>
      <tbody>
        <tr th:each="s : ${settings}">
          <td th:text="${s.keyName}">key</td>
          <td th:text="${s.settingValue}">value</td>
          <td>
            <a class="btn btn-sm btn-secondary" th:href="@{/admin/settings/edit/{id}(id=${s.id})}">Edit</a>
            <form th:action="@{/admin/settings/delete/{id}(id=${s.id})}" method="post" style="display:inline">
              <button class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
