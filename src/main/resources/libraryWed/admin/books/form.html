<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::body})}">
<body>
<div th:fragment="body" class="container py-4">

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-0 rounded-3">
        <div class="card-header bg-white border-bottom p-4">
          <h4 class="fw-bold text-primary mb-0">
            <i class="bi" th:classappend="${book.id != null ? 'bi-pencil-square' : 'bi-plus-circle-fill'}"></i>
            <span th:text="${book.id != null ? 'Cập nhật thông tin sách' : 'Thêm sách mới vào thư viện'}"></span>
          </h4>
        </div>

        <div class="card-body p-4">
          <form th:action="${action}" th:object="${book}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}" />

            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-semibold">Tiêu đề sách <span class="text-danger">*</span></label>
                <input class="form-control border-primary-subtle" type="text" th:field="*{title}" placeholder="Ví dụ: Lập trình Java Spring Boot" required />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Tác giả</label>
                <input class="form-control" type="text" th:field="*{author}" placeholder="Tên tác giả" />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Danh mục <span class="text-danger">*</span></label>
                <select class="form-select border-primary-subtle" th:field="*{category}" required>
                  <option value="">-- Chọn danh mục --</option>
                  <option th:each="cat : ${categories}"
                          th:value="${cat.id}"
                          th:text="${cat.name}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Mã ISBN</label>
                <input class="form-control" type="text" th:field="*{isbn}" placeholder="Mã số tiêu chuẩn quốc tế" />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Nhà xuất bản</label>
                <input class="form-control" type="text" th:field="*{publisher}" />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Năm xuất bản</label>
                <input class="form-control" type="number" th:field="*{publishYear}" min="1900" max="2099" />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Trạng thái</label>
                <select class="form-select" th:field="*{status}">
                  <option th:each="s : ${T(libraryManager.entity.Book.Status).values()}"
                          th:value="${s}"
                          th:text="${s}"></option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold">Tóm tắt nội dung</label>
                <textarea class="form-control" th:field="*{summary}" rows="4" placeholder="Viết vài dòng mô tả ngắn về cuốn sách..."></textarea>
              </div>
            </div>

            <div class="d-flex gap-2 mt-4 pt-3 border-top">
              <button class="btn btn-primary px-4 fw-bold shadow-sm" type="submit">
                <i class="bi bi-save me-1"></i> Lưu dữ liệu
              </button>
              <a class="btn btn-outline-secondary px-4 shadow-sm" th:href="@{/admin/books}">
                Hủy bỏ
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</div>
</body>
</html>
