<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <h4 th:text="${book.id} != null ? 'Sửa sách' : 'Thêm sách mới'"></h4>
    <form th:action="${action}" th:object="${book}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" th:field="*{id}" />
      <div class="mb-3">
        <label class="form-label">Tiêu đề</label>
        <input class="form-control" type="text" th:field="*{title}" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Tác giả</label>
        <input class="form-control" type="text" th:field="*{author}" />
      </div>
      <div class="mb-3">
        <label class="form-label">ISBN</label>
        <input class="form-control" type="text" th:field="*{isbn}" />
      </div>
      <div class="mb-3">
        <label class="form-label">Nhà xuất bản</label>
        <input class="form-control" type="text" th:field="*{publisher}" />
      </div>
      <div class="mb-3">
        <label class="form-label">Năm xuất bản</label>
        <input class="form-control" type="number" th:field="*{publishYear}" />
      </div>
      <div class="mb-3">
        <label class="form-label">Tóm tắt</label>
        <textarea class="form-control" th:field="*{summary}" rows="4"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Trạng thái</label>
        <select class="form-select" th:field="*{status}">
          <option th:each="s : ${T(com.example.lms.entity.Book.Status).values()}" th:value="${s}" th:text="${s}"></option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Lưu</button>
        <a class="btn btn-secondary" href="/admin/books">Hủy</a>
      </div>
    </form>
  </div>
</div>
