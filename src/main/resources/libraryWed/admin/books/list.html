<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Quản lý sách</h4>
      <a class="btn btn-success" href="/admin/books/new">Thêm sách mới</a>
    </div>

    <form class="mb-3" method="get" th:action="@{/admin/books}">
      <div class="input-group">
        <input class="form-control" type="text" name="q" th:value="${q}" placeholder="Tìm theo tiêu đề">
        <button class="btn btn-outline-secondary" type="submit">Tìm</button>
      </div>
    </form>

    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Tiêu đề</th>
          <th>Tác giả</th>
          <th>Năm</th>
          <th>Trạng thái</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="b : ${books}">
          <td th:text="${b.id}"></td>
          <td><a th:href="@{/admin/books/{id}(id=${b.id})}" th:text="${b.title}"></a></td>
          <td th:text="${b.author}"></td>
          <td th:text="${b.publishYear}"></td>
          <td th:text="${b.status}"></td>
          <td class="text-end">
            <a class="btn btn-sm btn-primary" th:href="@{/admin/books/{id}/edit(id=${b.id})}">Sửa</a>
            <form th:action="@{/admin/books/{id}/delete(id=${b.id})}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn btn-sm btn-danger" type="submit" onclick="return confirm('Xoá sách này?')">Xoá</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
