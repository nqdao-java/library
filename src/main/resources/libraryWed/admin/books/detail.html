<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <div class="container mt-4">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/admin/dashboard}">Admin</a></li>
          <li class="breadcrumb-item"><a th:href="@{/admin/books}">Quản lý Sách</a></li>
          <li class="breadcrumb-item active" aria-current="page" th:text="${book.title}">Chi tiết</li>
        </ol>
      </nav>

      <div class="card shadow-sm border-0">
        <div class="card-header bg-light py-3 d-flex justify-content-between align-items-center">
          <h4 class="mb-0 text-primary">
            <i class="bi bi-book-half me-2"></i>
            <span th:text="${book.title}">Tên Sách</span>
          </h4>
          <span th:classappend="${book.status == 'AVAILABLE' ? 'badge bg-success' : 'badge bg-warning text-dark'}"
                class="px-3 py-2"
                th:text="${book.status}">
            Trạng thái
          </span>
        </div>

        <div class="card-body p-4">
          <div class="row">
            <div class="col-md-8">
              <dl class="row mb-0">
                <dt class="col-sm-4 text-muted fw-normal mb-3" th:text="#{label.author}">Tác giả</dt>
                <dd class="col-sm-8 fw-bold mb-3">
                  <i class="bi bi-person text-secondary me-2"></i>
                  <span th:text="${book.author}"></span>
                </dd>

                <dt class="col-sm-4 text-muted fw-normal mb-3" th:text="#{label.isbn}">ISBN</dt>
                <dd class="col-sm-8 mb-3 text-monospace" th:text="${book.isbn}"></dd>

                <dt class="col-sm-4 text-muted fw-normal mb-3" th:text="#{label.publisher}">Nhà xuất bản</dt>
                <dd class="col-sm-8 mb-3" th:text="${book.publisher}"></dd>

                <dt class="col-sm-4 text-muted fw-normal mb-3" th:text="#{label.year}">Năm xuất bản</dt>
                <dd class="col-sm-8 mb-3" th:text="${book.publishYear}"></dd>
              </dl>
            </div>

            <div class="col-md-4 border-start d-none d-md-block text-center">
              <div class="p-4 bg-light rounded shadow-inner">
                <i class="bi bi-journal-text display-1 text-secondary"></i>
                <p class="small text-muted mt-2">Mã tài liệu: <span th:text="${book.id}"></span></p>
              </div>
            </div>
          </div>

          <div class="mt-4 pt-4 border-top">
            <h6 class="fw-bold mb-3" th:text="#{label.summary}">Tóm tắt nội dung</h6>
            <div class="p-3 bg-light rounded text-secondary shadow-sm"
                 style="line-height: 1.6; border-left: 4px solid #0d6efd;"
                 th:utext="${book.summary}">
              Nội dung tóm tắt...
            </div>
          </div>
        </div>

        <div class="card-footer bg-white p-3 border-top-0 d-flex gap-2">
          <a class="btn btn-outline-secondary px-4" th:href="@{/admin/books}">
            <i class="bi bi-arrow-left me-1"></i> <span th:text="#{button.back}">Quay lại</span>
          </a>
          <a class="btn btn-primary px-4" th:href="@{/admin/books/{id}/edit(id=${book.id})}">
            <i class="bi bi-pencil-square me-1"></i> <span th:text="#{button.edit}">Chỉnh sửa</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
