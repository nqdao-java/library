<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <div class="row">
      <div class="col-12">
        <h3 class="mb-3">Phạt</h3>
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead class="table-light">
              <tr><th>#</th><th>Người mượn</th><th>Sách</th><th>Số ngày quá hạn</th><th>Số tiền</th><th>Trạng thái</th><th>Thao tác</th></tr>
            </thead>
            <tbody>
              <tr th:each="fine,iter : ${fines}">
                <td th:text="${iter.count}"></td>
                <td th:text="${fine.loan.borrowerName}">Borrower</td>
                <td th:text="${fine.loan.bookItem.book.title}">Book</td>
                <td th:text="${fine.amount}">0</td>
                <td th:text="${fine.paid}"></td>
                <td th:text="${fine.createdAt}"></td>
                <td>
                  <form th:if="${!fine.paid}" th:action="@{/admin/fines/{id}/pay(id=${fine.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn btn-sm btn-success">Đánh dấu đã thanh toán</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
