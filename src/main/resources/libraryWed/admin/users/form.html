<div th:replace="~{layout/base :: layout(content=~{::body})}">
  <div th:fragment="body">
    <h4 th:text="${user.id} != null ? #{users.edit} : #{users.new}">Tạo người dùng</h4>
    <form th:action="@{/admin/users}" th:object="${user}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <input type="hidden" th:field="*{id}" />
      <div class="mb-3">
        <label class="form-label" th:text="#{users.username}">Username</label>
        <input class="form-control" th:field="*{username}" required />
      </div>
      <div class="mb-3">
        <label class="form-label" th:text="#{users.fullName}">Full name</label>
        <input class="form-control" th:field="*{fullName}" />
      </div>
      <div class="mb-3">
        <label class="form-label" th:text="#{users.email}">Email</label>
        <input class="form-control" type="email" th:field="*{email}" />
      </div>
      <div class="mb-3">
        <label class="form-label" th:text="#{users.password}">Password</label>
        <input class="form-control" type="password" th:field="*{password}" placeholder="" th:placeholder="#{users.password.placeholder}" />
      </div>
      <div class="mb-3">
        <label class="form-label" th:text="#{users.role}">Role</label>
        <select class="form-select" th:field="*{role}">
          <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
        </select>
      </div>`
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit" th:text="#{button.save}">Lưu</button>
        <a class="btn btn-secondary" th:href="@{/admin/users}" th:text="#{button.cancel}">Hủy</a>
      </div>
    </form>
  </div>
</div>
