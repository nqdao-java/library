<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(content=~{::body})}">
  <body>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 th:text="#{nav.bookItems}">Book Items</h1>
      <a class="btn btn-sm btn-primary" th:href="@{/admin/book-items/new}" th:text="#{form.newCopy}">New Copy</a>
    </div>
    <form class="mb-3" method="get" th:action="@{/admin/book-items}">
      <div class="input-group">
        <input type="text" class="form-control" name="q" th:value="${q}" th:placeholder="#{books.searchByBarcode}" />
        <button class="btn btn-outline-secondary" type="submit" th:text="#{button.search}">Search</button>
      </div>
    </form>
    <table class="table table-striped">
      <thead>
        <tr><th>#</th><th th:text="#{label.barcode}">Barcode</th><th th:text="#{label.book}">Book</th><th th:text="#{label.status}">Status</th><th th:text="#{table.actions}">Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="it,iterStat : ${items}">
          <td th:text="${iterStat.count}"></td>
          <td th:text="${it.barcode}"></td>
          <td th:text="${it.book.title}"></td>
          <td th:text="${it.status}"></td>
            <td>
            <a th:href="@{/admin/book-items/{id}(id=${it.id})}" class="btn btn-sm btn-outline-primary" th:text="#{button.view}">View</a>
            <a th:href="@{/admin/book-items/{id}/edit(id=${it.id})}" class="btn btn-sm btn-outline-secondary" th:text="#{button.edit}">Edit</a>
            <form th:action="@{/admin/book-items/{id}/delete(id=${it.id})}" method="post" th:onsubmit="return confirm('Delete?')" style="display:inline-block">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn btn-sm btn-danger" type="submit" th:text="#{button.delete}">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
