<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(content=~{::body})}">
  <body>
      <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 th:text="#{nav.categories}">Categories</h1>
      <a class="btn btn-sm btn-primary" th:href="@{/admin/categories/new}" th:text="#{categories.new}">New Category</a>
    </div>
    <form class="mb-3" method="get" th:action="@{/admin/categories}">
      <div class="input-group">
        <input type="text" class="form-control" name="q" th:value="${q}" th:placeholder="#{categories.searchPlaceholder}" />
        <button class="btn btn-outline-secondary" type="submit" th:text="#{button.search}">Search</button>
      </div>
    </form>
    <table class="table table-striped">
      <thead>
        <tr><th>#</th><th th:text="#{categories.name}">Name</th><th th:text="#{categories.description}">Description</th><th th:text="#{table.actions}">Actions</th></tr>
      </thead>
      <tbody>
        <tr th:each="c,iterStat : ${categories}">
          <td th:text="${iterStat.count}"></td>
          <td th:text="${c.name}"></td>
          <td th:text="${c.description}"></td>
          <td>
            <a th:href="@{/admin/categories/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary" th:text="#{button.view}">View</a>
            <a th:href="@{/admin/categories/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-secondary" th:text="#{button.edit}">Edit</a>
            <form th:action="@{/admin/categories/{id}/delete(id=${c.id})}" method="post" th:onsubmit="return confirm('Delete?')" style="display:inline-block">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button class="btn btn-sm btn-danger" type="submit" th:text="#{button.delete}">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
