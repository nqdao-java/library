<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(content=~{::body})}">
<body>
<div th:fragment="body" class="container py-4">

  <div class="category-header mb-5 p-5 bg-dark text-white rounded-4 shadow-lg position-relative overflow-hidden">
    <div class="position-relative z-1">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-2">
          <li class="breadcrumb-item"><a th:href="@{/books}" class="text-white-50">Thư viện</a></li>
          <li class="breadcrumb-item active text-white" aria-current="page">Danh mục</li>
        </ol>
      </nav>
      <h1 class="display-4 fw-bold mb-2" th:text="${category.name}">Tên Danh Mục</h1>
      <p class="lead opacity-75 mb-0" th:text="${category.description}">Mô tả ngắn về danh mục này...</p>
    </div>
    <i class="bi bi-tags-fill position-absolute end-0 bottom-0 opacity-10" style="font-size: 12rem; margin-bottom: -4rem; margin-right: -1rem;"></i>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
      <span class="text-primary" th:text="${#lists.size(books)}">0</span> Cuốn sách tìm thấy
    </h4>
    <a th:href="@{/admin/categories}" class="btn btn-outline-primary rounded-pill px-4">
      <i class="bi bi-arrow-left me-2"></i> Xem tất cả danh mục
    </a>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
    <div class="col" th:each="book : ${books}">
      <div class="card h-100 border-0 shadow-sm hover-card">
        <div class="card-body p-4 text-center">
          <div class="mb-3 bg-light rounded-3 py-4">
            <i class="bi bi-book text-primary display-6"></i>
          </div>
          <h5 class="card-title fw-bold text-dark mb-2 text-truncate" th:text="${book.title}">Title</h5>
          <p class="small text-muted mb-3">Tác giả: <span th:text="${book.author}">Author</span></p>

          <div class="d-grid">
            <a th:href="@{/books/detail(id=${book.id})}" class="btn btn-primary btn-sm rounded-pill">
              Xem chi tiết
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(books)}">
      <div class="py-5">
        <i class="bi bi-emoji-frown display-1 text-muted"></i>
        <p class="mt-3 fs-5 text-muted">Hiện tại chưa có cuốn sách nào trong danh mục này.</p>
      </div>
    </div>
  </div>

  <style>
    .hover-card {
        transition: all 0.3s ease;
        border-radius: 1rem;
    }
    .hover-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 1rem 3rem rgba(0,0,0,0.1) !important;
    }
    .category-header {
        background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
    }
    .breadcrumb-item + .breadcrumb-item::before {
        color: rgba(255,255,255,0.5);
    }
  </style>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</div>
</body>
</html>
