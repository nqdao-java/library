<!doctype html>
<html lang="en" th:fragment="layout(content)">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LMS - Quản lý thư viện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">LMS - Quản lý thư viện</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">Trang chủ</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/books}">Sách</a></li>
            <li class="nav-item dropdown" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
              <a class="nav-link dropdown-toggle" href="#" id="adminMenu" role="button" data-bs-toggle="dropdown">Quản trị</a>
              <ul class="dropdown-menu" aria-labelledby="adminMenu">
                <li><a class="dropdown-item" th:href="@{/admin/home}">Trang quản trị</a></li>
                <li><a class="dropdown-item" th:href="@{/admin/books}">Sách</a></li>
                <li><a class="dropdown-item" th:href="@{/admin/book-items}">Bản sao</a></li>
                <li><a class="dropdown-item" th:href="@{/admin/categories}">Danh mục</a></li>
                <li><a class="dropdown-item" th:href="@{/admin/users}">Người dùng</a></li>
                <li><a class="dropdown-item" th:href="@{/admin/fines}">Phạt</a></li>
                <li><a class="dropdown-item" th:href="@{/admin/settings}">Cấu hình</a></li>
              </ul>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" th:if="${#authorization.expression('hasRole(''ADMIN'')')}" th:href="@{/admin/home}">Quản trị</a></li>
            <li class="nav-item" th:if="${#authentication.name != 'anonymousUser'}">
              <a class="nav-link" th:text="${#authentication.name}">user</a>
            </li>
            <li class="nav-item" th:if="${#authentication.name != 'anonymousUser'}">
              <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="nav-link" >
                  Đăng xuất
                </button>
              </form>
            </li>
            <li class="nav-item" th:if="${#authentication.name == 'anonymousUser'}"><a class="nav-link" th:href="@{/auth/login}">Đăng nhập</a></li>
          </ul>
        </div>`
      </div>
    </nav>
    <div class="container">
      <div th:insert="${content}"></div>
    </div>
    <footer class="site-footer">
      <div class="container"><span th:text="'Quản lý thư viện — © ' + ${#dates.format(#dates.createNow(),'yyyy')}">Quản lý thư viện</span></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
